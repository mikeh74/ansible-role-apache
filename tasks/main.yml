---
- name: "Install Apache"
  ansible.builtin.apt:
    name: "{{ apache_packages }}"
    state: present
  become: true

- name: Enable additional Apache modules
  community.general.apache2_module:
    name: "{{ item }}"
    state: present
  loop: "{{ apache_modules }}"
  become: true
  notify: Restart apache

- name: Start Apache
  ansible.builtin.service:
    name: "{{ apache_service }}"
    state: started
    enabled: true
  become: true

- name: Add virtual hosts
  ansible.builtin.include_tasks: virtual_hosts.yml
  loop: "{{ virtual_hosts }}"
  when: virtual_hosts is defined

- name: Validate Apache configuration
  ansible.builtin.command: apache2ctl configtest
  register: apache_config_test
  changed_when: false
  failed_when: apache_config_test.rc != 0
  become: true
