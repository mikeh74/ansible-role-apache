---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly to catch breaking changes in dependencies
    - cron: '0 0 * * 0'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Run ansible-lint
        run: ansible-lint

  test:
    name: Test on Ubuntu ${{ matrix.ubuntu-version }}
    runs-on: ubuntu-${{ matrix.ubuntu-version }}
    strategy:
      matrix:
        ubuntu-version:
          - '22.04'  # Ubuntu 22.04 LTS (Jammy)
          - '24.04'  # Ubuntu 24.04 LTS (Noble)
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Install Ansible Galaxy dependencies
        run: |
          ansible-galaxy collection install community.general

      - name: Link role for testing
        run: |
          mkdir -p /home/runner/.ansible/roles
          ln -s $GITHUB_WORKSPACE /home/runner/.ansible/roles/apache

      - name: Run syntax check
        run: |
          cd tests && ansible-playbook test.yml --syntax-check

      - name: Run playbook
        run: |
          cd tests && sudo -E ansible-playbook test.yml

      - name: Run playbook again (idempotence test)
        run: |
          cd tests && sudo -E ansible-playbook test.yml | tee /tmp/idempotence.log
          grep -q 'changed=0.*failed=0' /tmp/idempotence.log && (echo 'Idempotence test: pass' && exit 0) || (echo 'Idempotence test: fail' && exit 1)

  galaxy:
    name: Galaxy import check
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check role structure
        run: |
          # Verify required directories exist
          for dir in defaults handlers meta tasks templates vars; do
            if [ ! -d "$dir" ]; then
              echo "Missing required directory: $dir"
              exit 1
            fi
          done
          
          # Verify meta/main.yml exists
          if [ ! -f "meta/main.yml" ]; then
            echo "Missing meta/main.yml"
            exit 1
          fi
          
          echo "✓ Role structure is valid for Galaxy import"
